name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1"

      - name: Install LinearMPC.jl
        run: julia -e 'using Pkg; Pkg.add("LinearMPC")'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install package and test dependencies
        run: pip install . pytest
        env:
          PYTHON_JULIAPKG_OFFLINE: "yes"

      - name: Run tests
        run: pytest tests/
        env:
          PYTHON_JULIAPKG_OFFLINE: "yes"
